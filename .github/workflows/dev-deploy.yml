name: Build and Deploy to S3 (Dev)

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy-to-s3:
    runs-on: ubuntu-latest
    env:
      CLOUDFRONT_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (dev mode)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
        run: npm run build:dev

      - name: Configure AWS credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy static files to S3
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_DEV }} --delete

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DIST_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DIST_ID }}" \
            --paths "/*"
